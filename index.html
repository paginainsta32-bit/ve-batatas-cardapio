<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V.E BATATAS</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="assets/logo.png" class="logo">
    <h1>V.E BATATAS</h1>
    <p>Batatas fritas e pratinho</p>
  </div>
</header>

<section class="carousel-container">
  <div class="carousel-track">
    <div class="carousel-item active">
      <img src="assets/batata.png" alt="Batatas Fritas">
      <div class="carousel-caption">Batatas Crocantes 🍟</div>
    </div>
    <div class="carousel-item">
      <img src="assets/pratinho.png" alt="Pratinhos">
      <div class="carousel-caption">Os Melhores Pratinhos 🍛</div>
    </div>
    <div class="carousel-item">
      <img src="assets/bebidas.png" alt="Bebidas Geladas">
      <div class="carousel-caption">Bebidas Trincando 🥤</div>
    </div>
  </div>

  <button class="carousel-btn prev" onclick="mudarSlide(-1)">&#10094;</button>
  <button class="carousel-btn next" onclick="mudarSlide(1)">&#10095;</button>

  <div class="carousel-dots">
    <span class="dot active" onclick="irParaSlide(0)"></span>
    <span class="dot" onclick="irParaSlide(1)"></span>
    <span class="dot" onclick="irParaSlide(2)"></span>
  </div>
</section>

<main class="container">

  <h2 class="titulo">🍟 Cardápio</h2>

  <div id="menu"></div>

  <div class="total-box">
    <h3>Total: <span id="total">R$ 0,00</span></h3>

    <button onclick="enviarPedido()">
      FINALIZAR PEDIDO
    </button>
  </div>

</main>

<script src="script.js"></script>

</body>
</html>
