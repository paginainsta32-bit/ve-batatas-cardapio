<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V.E BATATAS</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <img src="assets/logo.png" class="logo">
    <h1>V.E BATATAS</h1>
    <p>Batatas fritas e pratinho</p>
  </div>
</header>

<section class="carousel-container">
  <div class="carousel-track">
    <div class="carousel-item active">
      <img src="assets/batata.png" alt="Batatas Fritas">
      <div class="carousel-caption">Batatas Crocantes 🍟</div>
    </div>
    <div class="carousel-item">
      <img src="assets/pratinho.png" alt="Pratinhos">
      <div class="carousel-caption">Os Melhores Pratinhos 🍛</div>
    </div>
    <div class="carousel-item">
      <img src="assets/bebidas.png" alt="Bebidas Geladas">
      <div class="carousel-caption">Bebidas Trincando 🥤</div>
    </div>
  </div>

  <button class="carousel-btn prev" onclick="mudarSlide(-1)">&#10094;</button>
  <button class="carousel-btn next" onclick="mudarSlide(1)">&#10095;</button>

  <div class="carousel-dots">
    <span class="dot active" onclick="irParaSlide(0)"></span>
    <span class="dot" onclick="irParaSlide(1)"></span>
    <span class="dot" onclick="irParaSlide(2)"></span>
  </div>
</section>

<main class="container">

  <h2 class="titulo">🍟 Cardápio</h2>

  <div id="menu"></div>

  <div class="total-box">
    <h3>Total: <span id="total">R$ 0,00</span></h3>

    <button onclick="enviarPedido()">
      FINALIZAR PEDIDO
    </button>
  </div>

</main>

<div id="modal-pedido" class="modal-container">
  <div class="modal-content">
    <button class="modal-fechar" onclick="fecharModal()">&times;</button>
    
    <h2>📋 Dados do Pedido</h2>
    
    <form id="form-pedido" onsubmit="enviarPedidoFormulario(event)">
      <div class="form-group">
        <label for="nome">Seu Nome:</label>
        <input type="text" id="nome" required placeholder="Ex: Phelipe">
      </div>

      <div class="form-group">
        <label for="entrega">Como deseja receber?</label>
        <select id="entrega" onchange="verificarOpcaoEntrega()" required>
          <option value="entrega">Teleentrega (Receber em Casa)</option>
          <option value="retirada">Retirada no Local</option>
        </select>
      </div>

      <div id="campos-endereco">
        <div class="form-group">
          <label for="rua">Rua e Número:</label>
          <input type="text" id="rua" placeholder="Ex: Rua Central, 123">
        </div>
        <div class="form-group">
          <label for="bairro">Bairro:</label>
          <input type="text" id="bairro" placeholder="Ex: Centro">
        </div>
        <div class="form-group">
          <label for="referencia">Ponto de Referência:</label>
          <input type="text" id="referencia" placeholder="Ex: Próximo à praça">
        </div>
      </div>

      <div class="form-group">
        <label for="pagamento">Forma de Pagamento:</label>
        <select id="pagamento" onchange="verificarOpcaoPagamento()" required>
          <option value="Pix">Pix</option>
          <option value="Cartão">Cartão (Levar maquininha)</option>
          <option value="Dinheiro">Dinheiro</option>
        </select>
      </div>

      <div id="campo-troco" class="form-group" style="display: none;">
        <label for="troco">Precisa de troco para quanto?</label>
        <input type="text" id="troco" placeholder="Ex: Troco para R$ 50,00">
      </div>

      <button type="submit" class="btn-enviar-whats">
        🚀 ENVIAR PEDIDO PARA O WHATSAPP
      </button>
    </form>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
